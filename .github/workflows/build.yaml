name: Build KatieCute DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download ImGui
      run: |
        Invoke-WebRequest -Uri "https://github.com/ocornut/imgui/archive/refs/heads/master.zip" -OutFile "imgui.zip"
        Expand-Archive -Path "imgui.zip" -DestinationPath "."
        New-Item -ItemType Directory -Force -Path "src\imgui"
        Copy-Item "imgui-master\*.h"   "src\imgui\" -Force
        Copy-Item "imgui-master\*.cpp" "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_win32.h"          "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_win32.cpp"        "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_opengl3.h"        "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_opengl3.cpp"      "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_opengl3_loader.h" "src\imgui\" -Force
      shell: powershell

    - name: Download MinHook
      run: |
        Invoke-WebRequest -Uri "https://github.com/TsudaKageyu/minhook/releases/download/v1.3.3/MinHook_133_lib.zip" -OutFile "minhook.zip"
        Expand-Archive -Path "minhook.zip" -DestinationPath "minhook_tmp"
        New-Item -ItemType Directory -Force -Path "src\minhook\include"
        New-Item -ItemType Directory -Force -Path "src\minhook\lib"
        Copy-Item "minhook_tmp\include\MinHook.h"          "src\minhook\include\" -Force
        Copy-Item "minhook_tmp\lib\libMinHook.x64.lib"     "src\minhook\lib\MinHook.x64.lib" -Force
      shell: powershell

    - name: Build DLL
      run: |
        New-Item -ItemType Directory -Force -Path "bin"
        msbuild KatieCute.vcxproj /p:Configuration=Release /p:Platform=x64 /p:OutDir="${{ github.workspace }}\bin\" /m
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: KatieCute-DLL
        path: bin\KatieCute.dll
        if-no-files-found: error

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.run_number }}
        name: "KatieCute Build #${{ github.run_number }}"
        files: bin\KatieCute.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
