name: Build KatieCute DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download ImGui
      run: |
        Invoke-WebRequest -Uri "https://github.com/ocornut/imgui/archive/refs/heads/master.zip" -OutFile "imgui.zip"
        Expand-Archive -Path "imgui.zip" -DestinationPath "." -Force
        New-Item -ItemType Directory -Force -Path "src\imgui"
        Copy-Item "imgui-master\*.h"                                      "src\imgui\" -Force
        Copy-Item "imgui-master\*.cpp"                                    "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_win32.h"              "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_win32.cpp"            "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_opengl3.h"            "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_opengl3.cpp"          "src\imgui\" -Force
        Copy-Item "imgui-master\backends\imgui_impl_opengl3_loader.h"     "src\imgui\" -Force
        Write-Host "ImGui downloaded OK"
      shell: powershell

    - name: Download and Build MinHook from source
      run: |
        # Download MinHook source
        Invoke-WebRequest -Uri "https://github.com/TsudaKageyu/minhook/archive/refs/heads/master.zip" -OutFile "minhook_src.zip"
        Expand-Archive -Path "minhook_src.zip" -DestinationPath "." -Force

        # Build MinHook static lib
        msbuild "minhook-master\build\VC17\libMinHook.vcxproj" `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:PlatformToolset=v143

        # Setup our expected folder structure
        New-Item -ItemType Directory -Force -Path "src\minhook\include"
        New-Item -ItemType Directory -Force -Path "src\minhook\lib"
        Copy-Item "minhook-master\include\MinHook.h" "src\minhook\include\" -Force

        # Find the built .lib file wherever it is
        $libFile = Get-ChildItem -Path "minhook-master" -Recurse -Filter "*.lib" | 
                   Where-Object { $_.Name -like "*x64*" -or $_.DirectoryName -like "*x64*" } | 
                   Select-Object -First 1
        if ($libFile) {
            Write-Host "Found lib: $($libFile.FullName)"
            Copy-Item $libFile.FullName "src\minhook\lib\MinHook.x64.lib" -Force
        } else {
            # Fallback: grab any .lib file built
            $libFile = Get-ChildItem -Path "minhook-master" -Recurse -Filter "*.lib" | Select-Object -First 1
            Write-Host "Fallback lib: $($libFile.FullName)"
            Copy-Item $libFile.FullName "src\minhook\lib\MinHook.x64.lib" -Force
        }
        Write-Host "MinHook built OK"
        Write-Host "Lib files found:"
        Get-ChildItem -Path "src\minhook\lib\"
      shell: powershell

    - name: Build KatieCute DLL
      run: |
        New-Item -ItemType Directory -Force -Path "bin"
        msbuild KatieCute.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:OutDir="${{ github.workspace }}\bin\" `
          /m `
          /v:minimal
      shell: powershell

    - name: Check output
      run: |
        Write-Host "=== bin folder ==="
        Get-ChildItem -Path "bin\" -ErrorAction SilentlyContinue
      shell: powershell

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: KatieCute-DLL
        path: bin\KatieCute.dll
        if-no-files-found: error

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.run_number }}
        name: "KatieCute Build #${{ github.run_number }}"
        files: bin\KatieCute.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
