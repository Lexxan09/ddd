#include <Windows.h>
#include "hooks/hook.h"
DWORD WINAPI MainThread(LPVOID lp){
  while(!FindWindowA(nullptr,"Growtopia"))Sleep(500);
  Sleep(1000); Hook::Init();
  while(!GetAsyncKeyState(VK_END))Sleep(100);
  Hook::Shutdown(); FreeLibraryAndExitThread((HMODULE)lp,0); return 0;
}
BOOL APIENTRY DllMain(HMODULE hMod,DWORD r,LPVOID){
  if(r==DLL_PROCESS_ATTACH){DisableThreadLibraryCalls(hMod);CreateThread(nullptr,0,MainThread,hMod,0,nullptr);}
  return TRUE;
}
'@ | Set-Content src\dllmain.cpp -Encoding UTF8

        # ── hook.cpp ──────────────────────────────────────────────
        @'
#include <Windows.h>
#include <gl/GL.h>
#pragma comment(lib,"opengl32.lib")
#include "imgui/imgui.h"
#include "imgui/imgui_impl_win32.h"
#include "imgui/imgui_impl_opengl3.h"
#include "minhook/include/MinHook.h"
#pragma comment(lib,"minhook/lib/MinHook.x64.lib")
#include "hooks/hook.h"
#include "frontend/menu.h"
#include "frontend/colors.h"
namespace Hook{
  wglSwapBuffers_t o_wglSwapBuffers=nullptr;
  WndProc_t o_WndProc=nullptr;
  HWND g_hWnd=nullptr; bool g_Initialized=false;
  static void InitImGui(HDC hDc){
    g_hWnd=WindowFromDC(hDc); IMGUI_CHECKVERSION(); ImGui::CreateContext();
    ImGuiIO&io=ImGui::GetIO(); io.ConfigFlags|=ImGuiConfigFlags_NoMouseCursorChange; io.IniFilename=nullptr;
    ImGui_ImplWin32_Init(g_hWnd); ImGui_ImplOpenGL3_Init("#version 130");
    Menu::ApplyStyle();
    o_WndProc=(WndProc_t)SetWindowLongPtrW(g_hWnd,GWLP_WNDPROC,(LONG_PTR)hk_WndProc);
    g_Initialized=true;
  }
  BOOL WINAPI hk_wglSwapBuffers(HDC hDc){
    if(!g_Initialized)InitImGui(hDc);
    GLint lp,lt,la;
    glGetIntegerv(GL_CURRENT_PROGRAM,&lp); glGetIntegerv(GL_TEXTURE_BINDING_2D,&lt); glGetIntegerv(GL_ARRAY_BUFFER_BINDING,&la);
    ImGui_ImplOpenGL3_NewFrame(); ImGui_ImplWin32_NewFrame(); ImGui::NewFrame();
    Menu::Render(); ImGui::Render(); ImGui_ImplOpenGL3_RenderDrawData(ImGui::GetDrawData());
    glUseProgram(lp); glBindTexture(GL_TEXTURE_2D,lt); glBindBuffer(GL_ARRAY_BUFFER,la);
    return o_wglSwapBuffers(hDc);
  }
  extern IMGUI_IMPL_API LRESULT ImGui_ImplWin32_WndProcHandler(HWND,UINT,WPARAM,LPARAM);
  LRESULT CALLBACK hk_WndProc(HWND hWnd,UINT uMsg,WPARAM wParam,LPARAM lParam){
    if(uMsg==WM_KEYDOWN&&wParam==VK_INSERT)Menu::g_ShowMenu=!Menu::g_ShowMenu;
    if(Menu::g_ShowMenu){ImGui_ImplWin32_WndProcHandler(hWnd,uMsg,wParam,lParam);
      if(ImGui::GetIO().WantCaptureMouse||ImGui::GetIO().WantCaptureKeyboard)return TRUE;}
    return CallWindowProcW(o_WndProc,hWnd,uMsg,wParam,lParam);
  }
  void Init(){MH_Initialize();HMODULE h=GetModuleHandleA("opengl32.dll");if(!h)h=LoadLibraryA("opengl32.dll");
    void*p=(void*)GetProcAddress(h,"wglSwapBuffers");MH_CreateHook(p,(void*)hk_wglSwapBuffers,(void**)&o_wglSwapBuffers);MH_EnableHook(p);}
  void Shutdown(){MH_DisableHook(MH_ALL_HOOKS);MH_Uninitialize();
    if(g_hWnd&&o_WndProc)SetWindowLongPtrW(g_hWnd,GWLP_WNDPROC,(LONG_PTR)o_WndProc);
    ImGui_ImplOpenGL3_Shutdown();ImGui_ImplWin32_Shutdown();ImGui::DestroyContext();}
}
'@ | Set-Content src\hooks\hook.cpp -Encoding UTF8

        Write-Host "CPP files written OK"

    - name: Write menu.cpp
      shell: powershell
      run: |
        $menu = @'
#include <Windows.h>
#include <string>
#include <functional>
#include "imgui/imgui.h"
#include "imgui/imgui_internal.h"
#include "frontend/menu.h"
#include "frontend/colors.h"
namespace Menu{
bool g_ShowMenu=false; int g_Page=0,g_SubPage=0;
struct F{bool mf=0,ff=0,cg=0,nn=0,nc=0,ap=0,nv=0,nb=0,ds=0,dd=0,ec=0,pf=0,dm=0,mm=0,esp=0,fps=1,su=0;float rng=20;}f;
static const float W=680,H=470,SW=70,HH=55;
static ImU32 C(ImVec4 v){return ImGui::ColorConvertFloat4ToU32(v);}
static void T(ImDrawList*d,ImVec2 p,ImU32 c,const char*s){d->AddText(ImGui::GetFont(),ImGui::GetFontSize(),p,c,s);}
void ApplyStyle(){ImGuiStyle&s=ImGui::GetStyle();
  s.WindowPadding={0,0};s.WindowRounding=8;s.WindowBorderSize=0;
  s.ChildRounding=4;s.ChildBorderSize=0;s.FramePadding={8,4};s.FrameRounding=4;
  s.ItemSpacing={8,6};s.ScrollbarSize=4;s.GrabMinSize=8;s.GrabRounding=4;
  ImVec4*c=s.Colors;
  c[ImGuiCol_WindowBg]=Colors::window_bg;c[ImGuiCol_ChildBg]=Colors::child_bg;
  c[ImGuiCol_PopupBg]=ImColor(12,4,18,240);c[ImGuiCol_Border]=Colors::stroke;
  c[ImGuiCol_FrameBg]=Colors::chk_bg;c[ImGuiCol_FrameBgHovered]=Colors::btn_hov;
  c[ImGuiCol_FrameBgActive]=Colors::accent_dark;
  c[ImGuiCol_ScrollbarBg]=Colors::scroll_bg;c[ImGuiCol_ScrollbarGrab]=Colors::scroll_grab;
  c[ImGuiCol_ScrollbarGrabHovered]=Colors::scroll_hov;c[ImGuiCol_ScrollbarGrabActive]=Colors::accent;
  c[ImGuiCol_CheckMark]=Colors::chk_mark;c[ImGuiCol_SliderGrab]=Colors::slider_grab;
  c[ImGuiCol_SliderGrabActive]=Colors::accent;c[ImGuiCol_Button]=Colors::btn_bg;
  c[ImGuiCol_ButtonHovered]=Colors::btn_hov;c[ImGuiCol_ButtonActive]=Colors::accent;
  c[ImGuiCol_Text]=Colors::text_active;c[ImGuiCol_TextDisabled]=Colors::text_inactive;}
bool KcCheckbox(const char*label,bool*v){
  ImDrawList*d=ImGui::GetWindowDrawList();ImVec2 p=ImGui::GetCursorScreenPos();float sz=16;
  ImGui::InvisibleButton(label,{ImGui::GetContentRegionAvail().x,sz+4});
  bool hov=ImGui::IsItemHovered(),clk=ImGui::IsItemClicked();if(clk)*v=!*v;
  d->AddRectFilled(p+ImVec2(0,2),p+ImVec2(sz,sz+2),*v?C(Colors::accent):C(Colors::chk_bg),3);
  d->AddRect(p+ImVec2(0,2),p+ImVec2(sz,sz+2),hov?C(Colors::accent_dim):C(Colors::chk_stroke),3);
  if(*v){d->AddLine(p+ImVec2(3,9),p+ImVec2(6,12),IM_COL32(255,255,255,255),2);d->AddLine(p+ImVec2(6,12),p+ImVec2(13,5),IM_COL32(255,255,255,255),2);}
  T(d,p+ImVec2(sz+8,2),hov?C(Colors::text_active):C(Colors::text_inactive),label);return clk;}
bool KcButton(const char*label,ImVec2 size){
  if(!size.x)size.x=ImGui::GetContentRegionAvail().x;if(!size.y)size.y=24;
  ImDrawList*d=ImGui::GetWindowDrawList();ImVec2 p=ImGui::GetCursorScreenPos();
  ImGui::InvisibleButton(label,size);bool hov=ImGui::IsItemHovered(),clk=ImGui::IsItemClicked();
  d->AddRectFilled(p,p+size,hov?C(Colors::btn_hov):C(Colors::btn_bg),4);
  d->AddRect(p,p+size,hov?C(Colors::accent_dim):C(Colors::btn_stroke),4);
  ImVec2 ts=ImGui::CalcTextSize(label);T(d,p+(size-ts)*.5f,C(Colors::text_active),label);return clk;}
bool KcSliderFloat(const char*label,float*v,float mn,float mx){
  ImGui::PushStyleColor(ImGuiCol_FrameBg,Colors::slider_bg);
  ImGui::PushStyleColor(ImGuiCol_SliderGrab,Colors::accent);
  ImGui::PushStyleColor(ImGuiCol_Text,Colors::text_inactive);
  bool r=ImGui::SliderFloat(label,v,mn,mx,"%.1f");ImGui::PopStyleColor(3);return r;}
void KcGroupBox(const char*label,ImVec2 sz,std::function<void()>fn){
  ImDrawList*d=ImGui::GetWindowDrawList();ImVec2 p=ImGui::GetCursorScreenPos();
  d->AddRect(p,p+sz,C(Colors::stroke),4);
  ImVec2 ts=ImGui::CalcTextSize(label);
  d->AddRectFilled(p+ImVec2(8,-1),p+ImVec2(10+ts.x,1),C(Colors::child_bg));
  T(d,p+ImVec2(10,-7),C(Colors::child_title),label);
  ImGui::SetCursorScreenPos(p+ImVec2(0,12));
  ImGui::BeginChild(label,sz-ImVec2(0,12),false,ImGuiWindowFlags_NoScrollbar);
  ImGui::SetCursorPos({10,8});fn();ImGui::EndChild();}
bool KcSubtab(const char*label,int idx,int&cur){
  ImDrawList*d=ImGui::GetWindowDrawList();ImVec2 p=ImGui::GetCursorScreenPos();
  float w=ImGui::CalcTextSize(label).x+20,h=22;
  ImGui::InvisibleButton(label,{w,h});bool hov=ImGui::IsItemHovered(),clk=ImGui::IsItemClicked();
  if(clk)cur=idx;bool act=(cur==idx);
  T(d,p+ImVec2(10,3),act?C(Colors::subtab_active):hov?C(Colors::text_active):C(Colors::subtab_inactive),label);
  if(act)d->AddLine(p+ImVec2(10,h-1),p+ImVec2(w-10,h-1),C(Colors::subtab_line),2);
  ImGui::SameLine();return clk;}
void Sidebar(ImDrawList*d,ImVec2 p){
  d->AddRectFilled(p,p+ImVec2(SW,H),C(Colors::sidebar_bg),8,ImDrawFlags_RoundCornersLeft);
  d->AddLine(p+ImVec2(SW,0),p+ImVec2(SW,H),C(Colors::stroke));
  d->AddCircleFilled(p+ImVec2(35,30),18,C(Colors::accent_dark),60);
  d->AddCircle(p+ImVec2(35,30),19,C(Colors::accent),60,1.5f);
  T(d,p+ImVec2(24,23),C(Colors::text_active),"KC");
  d->AddLine(p+ImVec2(15,176),p+ImVec2(55,176),IM_COL32(255,255,255,15));
  d->AddLine(p+ImVec2(15,294),p+ImVec2(55,294),IM_COL32(255,255,255,15));
  const char*icons[]={"Main","Map","</>","Hook","Set"};
  for(int i=0;i<5;i++){float y=58.f+i*72;bool act=(g_Page==i);
    ImVec2 tp=p+ImVec2(0,y),ts={SW,60};
    if(act){d->AddRectFilled(tp,tp+ts,C(Colors::sel_active_bg));d->AddRectFilled(tp,tp+ImVec2(3,60),C(Colors::accent));}
    ImVec2 is=ImGui::CalcTextSize(icons[i]);T(d,tp+(ts-is)*.5f,act?C(Colors::accent):C(Colors::sel_text_off),icons[i]);
    ImGui::SetCursorScreenPos(tp);std::string id="##t"+std::to_string(i);
    ImGui::InvisibleButton(id.c_str(),ts);if(ImGui::IsItemClicked()){g_Page=i;g_SubPage=0;}}}
void Header(ImDrawList*d,ImVec2 p){
  d->AddRectFilled(p+ImVec2(SW,0),p+ImVec2(W,HH),C(Colors::header_bg),8,ImDrawFlags_RoundCornersTopRight);
  d->AddLine(p+ImVec2(SW,HH),p+ImVec2(W,HH),C(Colors::stroke));
  ImGui::SetCursorScreenPos(p+ImVec2(SW+12,16));
  if(g_Page==0){KcSubtab("Patches",0,g_SubPage);KcSubtab("Cheats",1,g_SubPage);}
  else if(g_Page==1)KcSubtab("Minimap",0,g_SubPage);
  else if(g_Page==2){KcSubtab("Scripts",0,g_SubPage);KcSubtab("Logs",1,g_SubPage);}
  else if(g_Page==4){KcSubtab("General",0,g_SubPage);}
  char tb[16];SYSTEMTIME st;GetLocalTime(&st);sprintf_s(tb,"%02d:%02d",st.wHour,st.wMinute);
  ImVec2 ts=ImGui::CalcTextSize(tb);T(d,p+ImVec2(W-ts.x-12,18),C(Colors::accent),tb);}
void Page0(ImVec2 o){
  ImGui::SetCursorScreenPos(o);
  ImGui::BeginChild("##p0",{W-SW-20,H-HH-10},false,ImGuiWindowFlags_NoScrollbar);
  float cw=(ImGui::GetContentRegionAvail().x-20)*.5f;
  ImGui::BeginChild("##l0",{cw,0});
  KcGroupBox("Patches",{cw-10,210},[&]{KcCheckbox("Mod Fly",&f.mf);ImGui::Spacing();KcCheckbox("Fast Fruits",&f.ff);ImGui::Spacing();KcCheckbox("Can See Ghost",&f.cg);ImGui::Spacing();KcCheckbox("No Name",&f.nn);});
  ImGui::EndChild();ImGui::SameLine(0,20);
  ImGui::BeginChild("##r0",{cw,0});
  KcGroupBox("More",{cw-10,210},[&]{KcCheckbox("No Clip",&f.nc);ImGui::Spacing();KcCheckbox("Anti Portal",&f.ap);ImGui::Spacing();KcCheckbox("Night Vision",&f.nv);ImGui::Spacing();KcCheckbox("No Block",&f.nb);});
  ImGui::EndChild();ImGui::EndChild();}
void Page1(ImVec2 o){
  ImGui::SetCursorScreenPos(o);
  ImGui::BeginChild("##p1",{W-SW-20,H-HH-10},false,ImGuiWindowFlags_NoScrollbar);
  float cw=(ImGui::GetContentRegionAvail().x-20)*.5f;
  ImGui::BeginChild("##l1",{cw,0});
  KcGroupBox("Cheats",{cw-10,200},[&]{KcCheckbox("Draw Sign",&f.ds);ImGui::Spacing();KcCheckbox("Draw Door",&f.dd);ImGui::Spacing();KcCheckbox("Entrance",&f.ec);ImGui::Spacing();KcCheckbox("Path Finder",&f.pf);ImGui::Spacing();KcCheckbox("Dev Mode",&f.dm);});
  ImGui::EndChild();ImGui::EndChild();}
void Page2(ImVec2 o){ImGui::SetCursorScreenPos(o);ImGui::BeginChild("##p2",{W-SW-20,H-HH-10});ImGui::TextColored(Colors::text_inactive,"Use in-game Minimap tab");ImGui::EndChild();}
void Page4(ImVec2 o){
  ImGui::SetCursorScreenPos(o);
  ImGui::BeginChild("##p4",{W-SW-20,H-HH-10});
  float cw=(ImGui::GetContentRegionAvail().x-20)*.5f;
  ImGui::BeginChild("##l4",{cw,0});
  KcGroupBox("General",{cw-10,160},[&]{KcCheckbox("Show FPS",&f.fps);ImGui::Spacing();KcCheckbox("Skip Update",&f.su);});
  ImGui::EndChild();ImGui::EndChild();}
void Render(){
  if(!g_ShowMenu)return;
  ImGui::SetNextWindowSize({W,H},ImGuiCond_Always);ImGui::SetNextWindowBgAlpha(0);
  ImGui::Begin("##kc",nullptr,ImGuiWindowFlags_NoTitleBar|ImGuiWindowFlags_NoResize|ImGuiWindowFlags_NoScrollbar|ImGuiWindowFlags_NoScrollWithMouse|ImGuiWindowFlags_NoBringToDisplayOnFocus);
  ImDrawList*d=ImGui::GetWindowDrawList();ImVec2 p=ImGui::GetWindowPos();
  d->AddRectFilled(p+ImVec2(SW,HH),p+ImVec2(W,H),C(Colors::window_bg),8,ImDrawFlags_RoundCornersBottomRight);
  for(int i=4;i>=1;i--){float o=(float)(i*3);d->AddRect(p-ImVec2(o,o),p+ImVec2(W+o,H+o),IM_COL32(0,0,0,30*i),10);}
  Sidebar(d,p);Header(d,p);
  ImVec2 co=p+ImVec2(SW+10,HH+8);
  if(g_Page==0)g_SubPage==0?Page0(co):Page1(co);
  else if(g_Page==1)Page2(co);
  else if(g_Page==4)Page4(co);
  else{ImGui::SetCursorScreenPos(co);ImGui::TextColored(Colors::text_inactive,"Coming soon...");}
  ImGui::End();}
}
