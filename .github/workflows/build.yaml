name: Build KatieCute DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: microsoft/setup-msbuild@v2

    - name: Download ImGui
      shell: powershell
      run: |
        Invoke-WebRequest "https://github.com/ocornut/imgui/archive/refs/heads/master.zip" -OutFile imgui.zip
        Expand-Archive imgui.zip . -Force
        New-Item -Force -ItemType Directory src\imgui | Out-Null
        Copy-Item imgui-master\*.h   src\imgui\ -Force
        Copy-Item imgui-master\*.cpp src\imgui\ -Force
        Copy-Item imgui-master\backends\imgui_impl_win32.h   src\imgui\ -Force
        Copy-Item imgui-master\backends\imgui_impl_win32.cpp src\imgui\ -Force
        Copy-Item imgui-master\backends\imgui_impl_opengl3.h   src\imgui\ -Force
        Copy-Item imgui-master\backends\imgui_impl_opengl3.cpp src\imgui\ -Force
        Copy-Item imgui-master\backends\imgui_impl_opengl3_loader.h src\imgui\ -Force

    - name: Build MinHook
      shell: powershell
      run: |
        Invoke-WebRequest "https://github.com/TsudaKageyu/minhook/archive/refs/heads/master.zip" -OutFile mh.zip
        Expand-Archive mh.zip . -Force
        msbuild minhook-master\build\VC17\libMinHook.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /v:m
        New-Item -Force -ItemType Directory src\minhook\include | Out-Null
        New-Item -Force -ItemType Directory src\minhook\lib     | Out-Null
        Copy-Item minhook-master\include\MinHook.h src\minhook\include\ -Force
        $lib = Get-ChildItem minhook-master -Recurse -Filter "*.lib" | Select -First 1
        Copy-Item $lib.FullName src\minhook\lib\MinHook.x64.lib -Force
        Write-Host "MinHook lib: $($lib.FullName)"

    - name: Write source files
      shell: powershell
      run: |
        New-Item -Force -ItemType Directory src\hooks    | Out-Null
        New-Item -Force -ItemType Directory src\frontend | Out-Null

        # ── colors.h ──────────────────────────────────────────────
        @'
